name: Update LR2IR Player Data

on:
  schedule:
    # 毎日 UTC 0:00 に実行（日本時間 9:00）
    - cron: '0 0 * * *'
  
  # 手動実行も可能
  workflow_dispatch:

jobs:
  update-player-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: Fetch and update player data
        run: |
          python fetch_player_data.py
      
      - name: Check if data has changed
        id: check_changes
        run: |
          if git diff --quiet docs/data/player.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git add docs/data/player.json
          git commit -m "chore: update player data [skip ci]"
          git push
      
      - name: No changes to commit
        if: steps.check_changes.outputs.changed == 'false'
        run: |
          echo "No changes in player data"
